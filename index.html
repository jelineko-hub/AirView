<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TopClima AirView</title>
<link rel="stylesheet" href="./src/style.css">
</head>
<body>
<header>
<h1>TopClima AirView <span style="font-size:10px;font-weight:400;color:#999">v2026.03.18-005</span></h1>
<span class="mode-label" id="modeLabel">Editor</span>
<span id="statusMsg">Nakresli izbu ťahaním myši</span>
<div class="group" style="margin-left:auto"><label>Zoom</label><input type="range" id="zoomSlider" min="30" max="400" value="100" style="width:80px"><span class="val" id="zoomVal">1.0×</span></div>
<div style="display:flex;gap:6px;align-items:center">
<button class="btn-sm" id="saveBtn" title="Uložiť do prehliadača">💾 Uložiť</button>
<button class="btn-sm" id="loadBtn" title="Načítať z prehliadača">📂 Načítať</button>
<button class="btn-sm" id="exportBtn" title="Stiahnuť ako JSON súbor">⬇ Export</button>
<label class="btn-sm" style="cursor:pointer" title="Načítať zo súboru">⬆ Import<input type="file" id="importFile" accept=".json" style="display:none"></label>
<div style="width:1px;height:20px;background:#ddd;margin:0 2px"></div>
<button class="btn-primary" id="simBtn" style="display:none">Simulovať →</button>
<button class="btn-sm" id="editBtn" style="display:none">← Upraviť</button>
<button class="btn-sm" id="clearBtn">Vymazať</button>
</div>
</header>
<div class="toolbar" id="edToolbar">
<button class="tb active" data-m="room">Izba</button>
<button class="tb" data-m="win">Okno</button>
<button class="tb" data-m="south">Juh ☀</button>
<button class="tb" data-m="west">Západ ☀</button>
<button class="tb" data-m="door">Dvere</button>
<button class="tb" data-m="ac">Klima</button>
<div class="sep"></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Izolácia</label><select id="insul" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="1">1 – Žiadna</option><option value="2" selected>2 – Slabá</option><option value="3">3 – Stredná</option><option value="4">4 – Hrubá</option></select></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Vonku J</label><select id="extS" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="30">30°C</option><option value="32">32°C</option><option value="34">34°C</option><option value="35" selected>35°C</option><option value="37">37°C</option><option value="40">40°C</option></select></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Vonku Z</label><select id="extW" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="28">28°C</option><option value="30" selected>30°C</option><option value="32">32°C</option><option value="34">34°C</option><option value="36">36°C</option></select></div>
<div class="sep"></div>
<button class="tb" data-m="couch">Gauč</button>
<button class="tb" data-m="bed">Posteľ</button>
<button class="tb" data-m="ward">Skriňa</button>
<button class="tb" data-m="table">Stôl</button>
<div class="sep"></div>
<button class="tb" data-m="temp">°C Teplota</button>
<span style="font-size:10px;color:#bbb;margin-left:8px">Klik na objekt = vymaž</span>
</div>
<div class="toolbar" id="simToolbar" style="display:none">
<button class="btn-sm" id="sB">Štart</button><button class="btn-sm" id="rBs">Reset</button>
<span id="ck" style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin:0 4px;min-width:62px;text-align:center;display:inline-block">00:00</span>
<div class="sep"></div>
<div class="group"><label>Cieľ</label><select id="aT"><option value="16">16°C</option><option value="17">17°C</option><option value="18">18°C</option><option value="19">19°C</option><option value="20">20°C</option><option value="21">21°C</option><option value="22" selected>22°C</option><option value="23">23°C</option><option value="24">24°C</option><option value="25">25°C</option></select></div>
<div class="group"><label>Čas</label><select id="sL"><option value="10">10m</option><option value="20">20m</option><option value="30" selected>30m</option><option value="45">45m</option><option value="60">60m</option><option value="120">120m</option></select></div>
<div class="sep"></div>
<div class="group"><label>Rozptyl</label><input type="range" min="40" max="160" step="5" value="100" id="sw"><span class="val" id="swV">100°</span></div>
<div class="group"><label>Smer</label><input type="range" min="-60" max="60" step="5" value="0" id="dr"><span class="val" id="drV">0°</span></div>
<div class="group"><label>Dosah</label><input type="range" min="50" max="200" step="10" value="100" id="tM"><span class="val" id="tMV">1.0x</span></div>
</div>
<div id="unitCards" style="display:none;padding:4px 16px;background:#faf9f6;border-bottom:1px solid #e8e5dd;flex-wrap:wrap;gap:6px;align-items:center"></div>
<div class="tune-row" id="tuneRow">
<span style="font-size:10px;font-weight:600;color:#888">Ladenie</span>
<div class="group"><span class="lbl">Gauč</span><input type="range" min="900" max="1000" step="5" value="990" id="dG" style="width:44px;accent-color:#0a5e46"><span class="val" id="dGV">.990</span></div>
<div class="group"><span class="lbl">Posteľ</span><input type="range" min="900" max="1000" step="5" value="995" id="dP" style="width:44px;accent-color:#0a5e46"><span class="val" id="dPV">.995</span></div>
<div class="group"><span class="lbl">Hrany</span><input type="range" min="0" max="50" step="2" value="50" id="eS" style="width:44px;accent-color:#0a5e46"><span class="val" id="eSV">5.0</span></div>
<div class="group"><span class="lbl">Difúzia</span><input type="range" min="10" max="500" step="5" value="300" id="dF" style="width:44px;accent-color:#0a5e46"><span class="val" id="dFV">3.0x</span></div>
<div class="group"><span class="lbl">Slnko</span><input type="range" min="0" max="100" step="5" value="50" id="sG" style="width:44px;accent-color:#0a5e46"><span class="val" id="sGV">50%</span></div>
</div>
<div class="info-bar" id="infoBar"></div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="legend" id="simLeg"><span>16°C</span><div class="bar"></div><span>30°C</span></div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
