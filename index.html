<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TopClima AirView</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f0eee8;color:#222;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}
header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#fff;border-bottom:1px solid #e0ddd5;flex-shrink:0}
header h1{font-size:16px;font-weight:700;color:#0a5e46}
.mode-label{font-size:12px;color:#888;background:#f0eee8;padding:2px 10px;border-radius:10px}
#statusMsg{font-size:11px;color:#666}
.toolbar{display:flex;align-items:center;gap:5px;padding:6px 16px;background:#faf9f6;border-bottom:1px solid #e8e5dd;flex-shrink:0;flex-wrap:wrap}
.sep{width:1px;height:20px;background:#ddd;margin:0 3px}
.tb{font-size:11px;padding:4px 12px;border-radius:5px;border:1px solid #d5d2ca;background:#fff;cursor:pointer;font-family:inherit;color:#555}
.tb:hover{border-color:#aaa}
.tb.active{background:#e6f5ef;color:#0a5e46;border-color:#0a5e46;font-weight:600}
.group{display:flex;align-items:center;gap:3px}
.group label{font-size:10px;color:#777}
.group select{font-size:10px;font-family:inherit;padding:2px 4px;border:1px solid #d0d0c8;border-radius:3px;background:#fff}
.group input[type=range]{width:50px;accent-color:#0a5e46}
.val{font-size:10px;font-weight:600;color:#444;min-width:24px}
.btn-primary{font-size:12px;font-weight:600;background:#0a5e46;color:#fff;border:none;padding:5px 16px;border-radius:5px;cursor:pointer;font-family:inherit}
.btn-sm{font-size:11px;padding:4px 12px;border-radius:5px;border:1px solid #d5d2ca;background:#fff;cursor:pointer;font-family:inherit}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;min-height:0}
canvas{background:#f7f6f2;border-radius:6px;cursor:crosshair;width:100%;height:100%;touch-action:none}
.legend{display:none;align-items:center;gap:5px;padding:3px 16px 6px;flex-shrink:0}
.legend span{font-size:9px;color:#999}
.legend .bar{height:7px;flex:1;max-width:280px;border-radius:3px;background:linear-gradient(to right,#1040d0,#20a0d0,#40c840,#e0d020,#e07020,#d02020)}
.info-bar{display:none;align-items:center;gap:14px;padding:4px 16px;background:#fff;border-bottom:1px solid #e0ddd5;flex-shrink:0}
.info-bar .metric{font-size:12px;color:#555}.info-bar .metric b{color:#222}
.ucard{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid #d5d2ca;border-radius:6px;background:#fff;font-size:10px;font-family:inherit;cursor:pointer;transition:all .15s}
.ucard.off{opacity:.4;background:#f0f0ec}
.ucard .unum{font-weight:700;font-size:13px;color:#0a5e46;min-width:16px}
.ucard.off .unum{color:#aaa}
.ucard select{font-size:10px;font-family:inherit;padding:1px 3px;border:1px solid #d0d0c8;border-radius:3px;background:#fff}
.ucard .utemp{font-weight:600;color:#222;min-width:40px}
.ucard .uinfo{font-size:9px;color:#888}
.tune-row{display:none;align-items:center;gap:6px;padding:4px 16px;background:#f5f4f0;border-bottom:1px solid #e8e5dd;flex-wrap:wrap;flex-shrink:0}
.tune-row .lbl{font-size:9px;color:#999}
</style>
</head>
<body>
<header>
<h1>TopClima AirView</h1>
<span class="mode-label" id="modeLabel">Editor</span>
<span id="statusMsg">Nakresli izbu ťahaním myši</span>
<div class="group" style="margin-left:auto"><label>Zoom</label><input type="range" id="zoomSlider" min="30" max="400" value="100" style="width:80px"><span class="val" id="zoomVal">1.0×</span></div>
<div style="display:flex;gap:6px;align-items:center">
<button class="btn-sm" id="saveBtn" title="Uložiť do prehliadača">💾 Uložiť</button>
<button class="btn-sm" id="loadBtn" title="Načítať z prehliadača">📂 Načítať</button>
<button class="btn-sm" id="exportBtn" title="Stiahnuť ako JSON súbor">⬇ Export</button>
<label class="btn-sm" style="cursor:pointer" title="Načítať zo súboru">⬆ Import<input type="file" id="importFile" accept=".json" style="display:none"></label>
<div style="width:1px;height:20px;background:#ddd;margin:0 2px"></div>
<button class="btn-primary" id="simBtn" style="display:none">Simulovať →</button>
<button class="btn-sm" id="editBtn" style="display:none">← Upraviť</button>
<button class="btn-sm" id="clearBtn">Vymazať</button>
</div>
</header>
<div class="toolbar" id="edToolbar">
<button class="tb active" data-m="room">Izba</button>
<button class="tb" data-m="win">Okno</button>
<button class="tb" data-m="south">Juh ☀</button>
<button class="tb" data-m="west">Západ ☀</button>
<button class="tb" data-m="door">Dvere</button>
<button class="tb" data-m="ac">Klima</button>
<div class="sep"></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Izolácia</label><select id="insul" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="1">1 – Žiadna</option><option value="2" selected>2 – Slabá</option><option value="3">3 – Stredná</option><option value="4">4 – Hrubá</option></select></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Vonku J</label><select id="extS" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="30">30°C</option><option value="32">32°C</option><option value="34">34°C</option><option value="35" selected>35°C</option><option value="37">37°C</option><option value="40">40°C</option></select></div>
<div class="group" style="gap:2px"><label style="font-size:10px">Vonku Z</label><select id="extW" style="font-size:10px;font-family:inherit;padding:1px 4px;border:1px solid #d0d0c8;border-radius:3px"><option value="28">28°C</option><option value="30" selected>30°C</option><option value="32">32°C</option><option value="34">34°C</option><option value="36">36°C</option></select></div>
<div class="sep"></div>
<button class="tb" data-m="couch">Gauč</button>
<button class="tb" data-m="bed">Posteľ</button>
<button class="tb" data-m="ward">Skriňa</button>
<button class="tb" data-m="table">Stôl</button>
<div class="sep"></div>
<button class="tb" data-m="temp">°C Teplota</button>
<span style="font-size:10px;color:#bbb;margin-left:8px">Klik na objekt = vymaž</span>
</div>
<div class="toolbar" id="simToolbar" style="display:none">
<button class="btn-sm" id="sB">Štart</button><button class="btn-sm" id="rBs">Reset</button>
<span id="ck" style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin:0 4px;min-width:62px;text-align:center;display:inline-block">00:00</span>
<div class="sep"></div>
<div class="group"><label>Cieľ</label><select id="aT"><option value="16">16°C</option><option value="17">17°C</option><option value="18">18°C</option><option value="19">19°C</option><option value="20">20°C</option><option value="21">21°C</option><option value="22" selected>22°C</option><option value="23">23°C</option><option value="24">24°C</option><option value="25">25°C</option></select></div>
<div class="group"><label>Čas</label><select id="sL"><option value="10">10m</option><option value="20">20m</option><option value="30" selected>30m</option><option value="45">45m</option><option value="60">60m</option><option value="120">120m</option></select></div>
<div class="sep"></div>
<div class="group"><label>Rozptyl</label><input type="range" min="40" max="160" step="5" value="100" id="sw"><span class="val" id="swV">100°</span></div>
<div class="group"><label>Smer</label><input type="range" min="-60" max="60" step="5" value="0" id="dr"><span class="val" id="drV">0°</span></div>
<div class="group"><label>Dosah</label><input type="range" min="50" max="200" step="10" value="100" id="tM"><span class="val" id="tMV">1.0x</span></div>
</div>
<div id="unitCards" style="display:none;padding:4px 16px;background:#faf9f6;border-bottom:1px solid #e8e5dd;flex-wrap:wrap;gap:6px;align-items:center"></div>
<div class="tune-row" id="tuneRow">
<span style="font-size:10px;font-weight:600;color:#888">Ladenie</span>
<div class="group"><span class="lbl">Gauč</span><input type="range" min="900" max="1000" step="5" value="990" id="dG" style="width:44px;accent-color:#0a5e46"><span class="val" id="dGV">.990</span></div>
<div class="group"><span class="lbl">Posteľ</span><input type="range" min="900" max="1000" step="5" value="995" id="dP" style="width:44px;accent-color:#0a5e46"><span class="val" id="dPV">.995</span></div>
<div class="group"><span class="lbl">Hrany</span><input type="range" min="0" max="50" step="2" value="50" id="eS" style="width:44px;accent-color:#0a5e46"><span class="val" id="eSV">5.0</span></div>
<div class="group"><span class="lbl">Difúzia</span><input type="range" min="10" max="500" step="5" value="300" id="dF" style="width:44px;accent-color:#0a5e46"><span class="val" id="dFV">3.0x</span></div>
<div class="group"><span class="lbl">Slnko</span><input type="range" min="0" max="100" step="5" value="50" id="sG" style="width:44px;accent-color:#0a5e46"><span class="val" id="sGV">50%</span></div>
</div>
<div class="info-bar" id="infoBar"></div>
<div class="canvas-wrap"><canvas id="c"></canvas></div>
<div class="legend" id="simLeg"><span>16°C</span><div class="bar"></div><span>30°C</span></div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');let CW,CH;
function resize(){const rect=cv.getBoundingClientRect();const w=Math.round(rect.width),h=Math.round(rect.height);
if(w<10||h<10)return;const dpr=window.devicePixelRatio||1;cv.width=Math.round(w*dpr);cv.height=Math.round(h*dpr);CW=w;CH=h;cx.scale(dpr,dpr)}
resize();window.addEventListener('resize',resize);
requestAnimationFrame(()=>{resize()});
const PPM=80,GRID=.1,OX=50,OY=36;let mode='editor',tool='room';
let rooms=[],wins=[],furns=[],acUnits=[],doors=[],southSide=null,westSide=null;
let dragS=null,dragE=null,isDrag=false,dragFurn=-1,dragOff={x:0,y:0},curX=-1,curY=-1,clickGuard=0;
let vX=0,vY=0,panOn=false,panPX=0,panPY=0,panVX=0,panVY=0;
let zoom=1,wallDrag=null,pinchOn=false,pinchDist0=0,pinchCX0=0,pinchCY0=0,pinchVX=0,pinchVY=0,pinchZoom0=1;
const ptrs=new Map();
const furDefs={couch:{w:1.6,h:.6,l:'Gauč',d:.99,sol:false},bed:{w:1.4,h:1.9,l:'Posteľ',d:.995,sol:false},ward:{w:.6,h:1.6,l:'Skriňa',d:1,sol:true},table:{w:.8,h:.5,l:'Stôl',d:.995,sol:false}};
const mdl=[{n:'2.5kW',w:77,t:4,cool:.018},{n:'3.5kW',w:80,t:5.5,cool:.025},{n:'5.0kW',w:90,t:8.4,cool:.035}];
function mToP(m){return m*PPM}function pToM(p){return p/PPM}function snapM(v){return Math.round(v/GRID)*GRID}function snapM2(v){return Math.round(v/(GRID*2))*(GRID*2)}
function setTool(t){tool=t;clickGuard=Date.now();document.querySelectorAll('#edToolbar .tb').forEach(b=>b.classList.toggle('active',b.dataset.m===t));
const ms={room:'Ťahaj = nová izba, klik = vymaž izbu',win:'Klikni na stenu pre okno',south:'Klikni kdekoľvek – najbližšia strana = JUH',west:'Klikni kdekoľvek – najbližšia strana = ZÁPAD',door:'Klikni na zdieľanú stenu pre dvere',ac:'Klikni na stenu pre klimu',couch:'Klikni do izby',bed:'Klikni do izby',ward:'Klikni do izby',table:'Klikni do izby',temp:'Klikni na izbu = zmeniť štartovaciu teplotu'};
document.getElementById('statusMsg').textContent=ms[t]||''}
document.querySelectorAll('#edToolbar .tb').forEach(b=>b.onclick=()=>setTool(b.dataset.m));
function allBB(){if(!rooms.length)return null;let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;rooms.forEach(r=>{x1=Math.min(x1,r.x);y1=Math.min(y1,r.y);x2=Math.max(x2,r.x+r.w);y2=Math.max(y2,r.y+r.h)});return{x:x1,y:y1,w:x2-x1,h:y2-y1}}
function ptInAnyRoom(mx,my){return rooms.some(r=>{const rx=OX+mToP(r.x),ry=OY+mToP(r.y);return mx>rx&&mx<rx+mToP(r.w)&&my>ry&&my<ry+mToP(r.h)})}
function wallAt(mx,my){const M=6,TH=28;let cands=[];
for(let i=0;i<rooms.length;i++){const r=rooms[i],rx=OX+mToP(r.x),ry=OY+mToP(r.y),rw=mToP(r.w),rh=mToP(r.h);
const inside=mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh;
if(mx>=rx-M&&mx<=rx+rw+M){const dT=Math.abs(my-ry);if(dT<TH)cands.push({ri:i,wall:'top',pos:Math.max(.03,Math.min(.97,(mx-rx)/rw)),d:dT,inside})}
if(mx>=rx-M&&mx<=rx+rw+M){const dB=Math.abs(my-(ry+rh));if(dB<TH)cands.push({ri:i,wall:'bottom',pos:Math.max(.03,Math.min(.97,(mx-rx)/rw)),d:dB,inside})}
if(my>=ry-M&&my<=ry+rh+M){const dL=Math.abs(mx-rx);if(dL<TH)cands.push({ri:i,wall:'left',pos:Math.max(.03,Math.min(.97,(my-ry)/rh)),d:dL,inside})}
if(my>=ry-M&&my<=ry+rh+M){const dR=Math.abs(mx-(rx+rw));if(dR<TH)cands.push({ri:i,wall:'right',pos:Math.max(.03,Math.min(.97,(my-ry)/rh)),d:dR,inside})}}
if(!cands.length)return null;
cands.sort((a,b)=>{if(Math.abs(a.d-b.d)<4){if(a.inside!==b.inside)return a.inside?-1:1}return a.d-b.d});
return{ri:cands[0].ri,wall:cands[0].wall,pos:cands[0].pos}}
function isSharedWall(ri,wall){const r=rooms[ri];let ev,ax;
if(wall==='top'){ev=r.y;ax='h'}else if(wall==='bottom'){ev=r.y+r.h;ax='h'}else if(wall==='left'){ev=r.x;ax='v'}else{ev=r.x+r.w;ax='v'}
for(let j=0;j<rooms.length;j++){if(j===ri)continue;const o=rooms[j];
if(ax==='h'){if(Math.abs(o.y-ev)<.02||Math.abs(o.y+o.h-ev)<.02){const s=Math.max(r.x,o.x),e=Math.min(r.x+r.w,o.x+o.w);if(e>s+.05)return true}}
else{if(Math.abs(o.x-ev)<.02||Math.abs(o.x+o.w-ev)<.02){const s=Math.max(r.y,o.y),e=Math.min(r.y+r.h,o.y+o.h);if(e>s+.05)return true}}}return false}
function objPx(type,obj){const r=rooms[obj.ri];if(!r)return null;const rx=OX+mToP(r.x),ry=OY+mToP(r.y),rw=mToP(r.w),rh=mToP(r.h);
const hw=mToP(type==='win'?.6:.45);
if(obj.wall==='top')return{x1:rx+obj.pos*rw-hw,y1:ry,x2:rx+obj.pos*rw+hw,y2:ry};
if(obj.wall==='bottom')return{x1:rx+obj.pos*rw-hw,y1:ry+rh,x2:rx+obj.pos*rw+hw,y2:ry+rh};
if(obj.wall==='left')return{x1:rx,y1:ry+obj.pos*rh-hw,x2:rx,y2:ry+obj.pos*rh+hw};
return{x1:rx+rw,y1:ry+obj.pos*rh-hw,x2:rx+rw,y2:ry+obj.pos*rh+hw}}
function chkRdy(){document.getElementById('simBtn').style.display=(rooms.length&&acUnits.length)?'':'none'}
function tryDeleteAt(mx,my){
for(let i=wins.length-1;i>=0;i--){const p=objPx('win',wins[i]);if(!p)continue;if(Math.sqrt((mx-(p.x1+p.x2)/2)**2+(my-(p.y1+p.y2)/2)**2)<30){wins.splice(i,1);document.getElementById('statusMsg').textContent='Okno vymazané';return true}}
for(let i=doors.length-1;i>=0;i--){const p=objPx('door',doors[i]);if(!p)continue;if(Math.sqrt((mx-(p.x1+p.x2)/2)**2+(my-(p.y1+p.y2)/2)**2)<30){doors.splice(i,1);document.getElementById('statusMsg').textContent='Dvere vymazané';return true}}
for(let i=furns.length-1;i>=0;i--){const f=furns[i],fx=OX+mToP(f.x),fy=OY+mToP(f.y);
if(mx>fx&&mx<fx+mToP(f.w)&&my>fy&&my<fy+mToP(f.h)){furns.splice(i,1);document.getElementById('statusMsg').textContent=f.l+' vymazaný';return true}}
for(let i=acUnits.length-1;i>=0;i--){const u=acUnits[i],r=rooms[u.ri];if(!r)continue;
const rx=OX+mToP(r.x),ry=OY+mToP(r.y),rw=mToP(r.w),rh=mToP(r.h);
let ax,ay;if(u.wall==='top'){ax=rx+u.pos*rw;ay=ry}else if(u.wall==='bottom'){ax=rx+u.pos*rw;ay=ry+rh}else if(u.wall==='left'){ax=rx;ay=ry+u.pos*rh}else{ax=rx+rw;ay=ry+u.pos*rh}
if(Math.sqrt((mx-ax)**2+(my-ay)**2)<35){acUnits.splice(i,1);document.getElementById('statusMsg').textContent='Klima #'+(i+1)+' vymazaná';chkRdy();return true}}
return false}
function drawGrid(){const GW=30,GH=20;cx.fillStyle='#f7f6f2';cx.fillRect(-vX/zoom,-vY/zoom,CW/zoom,CH/zoom);
const vx0=Math.max(0,Math.floor((-vX/zoom-OX)/PPM/GRID)*GRID),vx1=Math.min(GW,Math.ceil(((CW-vX)/zoom-OX)/PPM/GRID)*GRID);
const vy0=Math.max(0,Math.floor((-vY/zoom-OY)/PPM/GRID)*GRID),vy1=Math.min(GH,Math.ceil(((CH-vY)/zoom-OY)/PPM/GRID)*GRID);
cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=.5;cx.beginPath();
for(let m=vx0;m<=vx1;m+=GRID){cx.moveTo(OX+m*PPM,OY+vy0*PPM);cx.lineTo(OX+m*PPM,OY+vy1*PPM)}
for(let m=vy0;m<=vy1;m+=GRID){cx.moveTo(OX+vx0*PPM,OY+m*PPM);cx.lineTo(OX+vx1*PPM,OY+m*PPM)}cx.stroke();
cx.strokeStyle='rgba(0,0,0,0.25)';cx.lineWidth=.7;cx.beginPath();
for(let m=0;m<=GW;m+=.5){cx.moveTo(OX+m*PPM,OY);cx.lineTo(OX+m*PPM,OY+GH*PPM)}
for(let m=0;m<=GH;m+=.5){cx.moveTo(OX,OY+m*PPM);cx.lineTo(OX+GW*PPM,OY+m*PPM)}cx.stroke();
cx.strokeStyle='rgba(0,0,0,0.35)';cx.lineWidth=1;cx.beginPath();
for(let m=0;m<=GW;m+=1){cx.moveTo(OX+m*PPM,OY);cx.lineTo(OX+m*PPM,OY+GH*PPM)}
for(let m=0;m<=GH;m+=1){cx.moveTo(OX,OY+m*PPM);cx.lineTo(OX+GW*PPM,OY+m*PPM)}cx.stroke();
cx.fillStyle='#777';cx.font='10px DM Sans,sans-serif';cx.textAlign='center';for(let m=0;m<=GW;m+=1)cx.fillText(m+'m',OX+m*PPM,OY-8);
cx.textAlign='right';for(let m=0;m<=GH;m+=1)cx.fillText(m+'m',OX-6,OY+m*PPM+3)}
function drawEditor(){cx.clearRect(0,0,CW,CH);cx.save();cx.translate(vX,vY);cx.scale(zoom,zoom);drawGrid();
if(isDrag&&dragS&&dragE){const x1=OX+mToP(Math.min(dragS.mx,dragE.mx)),y1=OY+mToP(Math.min(dragS.my,dragE.my)),w=mToP(Math.abs(dragE.mx-dragS.mx)),h=mToP(Math.abs(dragE.my-dragS.my));
if(w>5&&h>5){cx.fillStyle='rgba(29,158,117,.05)';cx.fillRect(x1,y1,w,h);cx.strokeStyle='#1D9E75';cx.lineWidth=2;cx.setLineDash([6,4]);cx.strokeRect(x1,y1,w,h);cx.setLineDash([]);
const wm=Math.abs(dragE.mx-dragS.mx),hm=Math.abs(dragE.my-dragS.my);cx.fillStyle='#0a5e46';cx.font='bold 15px DM Sans';cx.textAlign='center';
cx.fillText(wm.toFixed(1)+' m',x1+w/2,y1-12);cx.save();cx.translate(x1-14,y1+h/2);cx.rotate(-Math.PI/2);cx.fillText(hm.toFixed(1)+' m',0,0);cx.restore();
cx.fillStyle='rgba(10,94,70,.4)';cx.font='13px DM Sans';cx.fillText(Math.round(wm*hm*10)/10+' m²',x1+w/2,y1+h/2+5)}}
rooms.forEach(r=>{const rx=OX+mToP(r.x),ry=OY+mToP(r.y),rw=mToP(r.w),rh=mToP(r.h);cx.fillStyle='#f0efeb';cx.fillRect(rx,ry,rw,rh)});
rooms.forEach(r=>{const rx=OX+mToP(r.x),ry=OY+mToP(r.y),rw=mToP(r.w),rh=mToP(r.h);cx.strokeStyle='#222';cx.lineWidth=2.5;cx.strokeRect(rx,ry,rw,rh);
